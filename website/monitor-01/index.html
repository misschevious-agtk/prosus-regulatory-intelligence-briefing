ency. If the investigation finds abuse, it materially changes the Toqan and Anthropic procurement equation. Cross-monitor link to M02 dominance.", "co": "Toqan · Stack Overflow · vendor stack", "owner": "Group AI Counsel", "ownerTeam": "Group Legal", "rule": "Rule 12"}, {"id": "in-india-dpdp-act-enforcement-clock-phase-2-consent-managers-takes-force-in-6-months-pr06", "theme": "privacy", "catLabel": "Privacy & Data", "country": "IN", "countryLabel": "IN India", "risk": "med", "date": "2026-05-13", "dateLabel": "13 May 2026", "source": "IAPP / MeitY", "url": "https://iapp.org/news/a/with-rules-finalized-india-s-dpdpa-takes-force", "title": "India DPDP Act enforcement clock: Phase 2 (consent managers) takes force in 6 months", "body": "India's DPDP Act remains in phased enforcement: Phase 1 has been live since November 2025; Phase 2 (consent-manager registration and DPBI inquiry powers) takes force November 2026; Phase 3 (full substantive obligations) is live 13 May 2027. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for Swiggy, PharmEasy, PayU India and the Stack Overflow and Brainly India audiences. Twelve-month operational runway to Phase 3 — DPIAs, consent-manager onboarding and fiduciary registration are all on the critical path.", "co": "Swiggy · PharmEasy · PayU India · Stack Overflow · Brainly India", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "us-cppa-finalises-ccpa-regulations-on-automated-decision-making-technology-admt-pr22", "theme": "privacy", "catLabel": "Privacy & Data", "country": "US", "countryLabel": "US United States", "risk": "high", "date": "2026-05-13", "dateLabel": "13 May 2026", "source": "California AG / CPPA", "url": "https://cppa.ca.gov/", "title": "CPPA finalises CCPA regulations on automated decision-making technology (ADMT)", "body": "The California Privacy Protection Agency finalised the CCPA regulations governing automated decision-making technology (ADMT), including notice, opt- ttps://digital-strategy.ec.europa.eu/en/policies/ai-office", "title": "AI Office publishes template for systemic-risk evaluation reporting under Article 55", "body": "The AI Office released a standardised template for systemic-risk evaluation reporting for GPAI models with systemic risk. The template streamlines submissions and aligns with NIST AI RMF and the UK AISI evaluation harness. [Source tier A · Verdict: medium · Action: brief]", "why": "Drives vendor-attestation language for OpCo AI procurement. Anthropic, OpenAI and Google submissions under this template flow into OpCo indemnity and service-level commitments.", "co": "all OpCo vendor-stack procurement", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-irish-dpc-fines-tiktok-530m-over-china-data-transfer-misrepresentations-pr01", "theme": "privacy", "catLabel": "Privacy & Data", "country": "EU", "countryLabel": "EU European Union", "risk": "high", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "Irish DPC", "url": "https://www.dataprotection.ie/", "title": "Irish DPC fines TikTok €530m over China data-transfer misrepresentations", "body": "The Irish DPC issued a €530m (approximately US$600m) GDPR penalty against TikTok for transferring personal data of European users to servers in China. TikTok had earlier represented to the regulator that no European user data was stored in China; February findings showed that representation was incorrect. [Source tier A · Verdict: tight · Action: escalate]", "why": "Largest cross-border-transfer fine to date. Sets the price of mis-stating data-flow geography to a DPA. Direct read-across for any Prosus OpCo with Chinese-vendor sub-processors or Tencent-side data dependencies. Reinforces Rule 14 (M01 DPF / cross-border-transfer fragility).", "co": "Tencent NAV exposure · vendor stack · OLX · iFood", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "us-texas-ag-paxton-secures-lg-smart-tv-acr-opt-in-settlement-notifies-100-data-brokers-pr0", "theme": "privacy", "catLabel": "Privacy & Data", "country": "US", "countryLabel": "US United States", "risk": "high", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "Texas AG", "url": "https://www.texasattorneygeneral.gov/", "title": "Texas AG Paxton secures LG smart-TV ACR opt-in settlement; notifies 100+ data brokers", "body": "The Texas AG announced an agreement with LG Electronics USA requiring opt-in for Automated Content Recognition on smart TVs and barring transfer of viewing data to CCP-linked entities. The same day, the AG notified 100+ companies of apparent Texas Data Broker Law violations. [Source tier A · Verdict: tight · Action: brief]", "why": "Texas is now the most assertive US AG on consumer-electronics data flows and data brokers. Cross-jurisdictional pressure for OpCos using ACR-like fingerprinting or selling derived data to brokers. Read-through to Prosus ad-tech and audience-segmentation product surfaces.", "co": "OLX · PayU · all platforms", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "fr-cnil-annual-enforcement-report-flags-cookie-walls-and-dark-patterns-as-2026-priorities-", "theme": "privacy", "catLabel": "Privacy & Data", "country": "FR", "countryLabel": "FR France", "risk": "med", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "CNIL", "url": "https://www.cnil.fr/", "title": "CNIL annual enforcement report flags cookie-walls and dark patterns as 2026 priorities", "body": "The French CNIL published its annual enforcement report, naming cookie-walls and dark patterns as its top 2026 priorities. The report highlights stepped-up sanctions for non-compliant consent banners on high-traffic platforms. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct relevance for OLX FR and any French-facing OpCo with monetised consent flows (Swiggy ads experiments, PayU France integrations). Consent UX should be re-audited against the CNIL's new criteria.", "co": "OLX FR · PayU · ad-tech", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "br-anpd-publishes-consultation-outcomes-for-adm-ai-regulation-under-lgpd-pr30", "theme": "privacy", "catLabel": "Privacy & Data", "country": "BR", "countryLabel": "BR Brazil", "risk": "high", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "ANPD", "url": "https://www.gov.br/anpd/", "title": "ANPD publishes consultation outcomes for ADM/AI regulation under LGPD", "body": "Brazil's ANPD published the consultation outcomes for its automated decision-making and AI regulation under the LGPD. The regulation creates a tiered risk regime with mandatory algorithmic-impact assessment for high-risk uses. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for iFood, PayU LatAm, and any OpCo using Brazilian-user data in automated decisions. AIA templates here will be referenced across LatAm.", "co": "iFood · PayU LatAm", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-edpb-opinion-28-2024-follow-up-clarifications-on-ai-training-lawful-bases-under-gdpr-pr", "theme": "privacy", "catLabel": "Privacy & Data", "country": "EU", "countryLabel": "EU European Union", "risk": "high", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "EDPB", "url": "https://www.edpb.europa.eu/", "title": "EDPB Opinion 28/2024 follow-up: clarifications on AI training lawful bases under GDPR", "body": "The EDPB published clarifications on its Opinion 28/2024 governing AI training lawful bases under GDPR. The clarifications refine the legitimate-interest test architecture for training-data scraping. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for any OpCo training models on user content or scraped web data (Brainly, Stack Overflow, Toqan).", "co": "Brainly · Stack Overflow · Toqan", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-cjeu-c-xxx-26-referral-on-the-boundaries-of-cdsm-art-4-tdm-opt-out-ip27", "theme": "ip", "catLabel": "IP & Brand", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "CJEU", "url": "https://curia.europa.eu/", "title": "CJEU C-XXX/26 referral on the boundaries of CDSM Art. 4 TDM opt-out", "body": "A new CJEU referral asks how the CDSM Art. 4 TDM opt-out should be encoded by rightholders to be effective and how AI scrapers must process such signals. [Source tier A · Verdict: tight · Action: brief]", "why": "Foundational ruling that will determine training-data lawfulness in the EU. Vendor-stack indemnity needs to be reviewed in advance of the ruling.", "co": "Toqan · all OpCo AI vendors", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "us-federal-circuit-en-banc-panel-takes-up-ai-patent-eligibility-under-section-101-ip41", "theme": "ip", "catLabel": "IP & Brand", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "US Federal Circuit", "url": "https://www.cafc.uscourts.gov/", "title": "Federal Circuit en banc panel takes up AI patent eligibility under Section 101", "body": "The Federal Circuit announced an en banc panel review of a case addressing AI patent eligibility under Section 101. The case will define the abstract-idea analysis for AI claims in the post-Alice era. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct relevance to Group Tech patent posture and any AI patent strategy.", "co": "Group Tech patent posture", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "us-thomson-reuters-extends-westlaw-ai-ecosystem-with-new-partner-agreements-lo02", "theme": "legal-ops", "catLabel": "Legal Tech M&A", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "Thomson Reuters", "url": "https://www.thomsonreuters.com/", "title": "Thomson Reuters extends Westlaw AI ecosystem with  brief]", "why": "Useful benchmark for Group Legal Ops compensation strategy.", "co": "Group Legal Ops", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "us-aba-formal-opinion-513-privilege-considerations-in-ai-tool-use-lo32", "theme": "legal-ops", "catLabel": "Privilege & AI", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-12", "dateLabel": "12 May 2026", "source": "ABA", "url": "https://www.americanbar.org/", "title": "ABA Formal Opinion 513 — privilege considerations in AI tool use", "body": "The American Bar Association issued Formal Opinion 513 on privilege considerations in AI-tool use, providing detailed guidance on attorney-client privilege and work-product doctrine in the AI context. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for Group Legal Ops AI-tool deployment posture and OpCo US-side legal-team guidance.", "co": "Group Legal Ops · OpCo US legal", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "fr-cnil-publishes-guidance-on-lawful-bases-for-ai-training-data-scraping-ai04", "theme": "ai-news", "catLabel": "AI Policy", "country": "FR", "countryLabel": "FR France", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "CNIL", "url": "https://www.cnil.fr/en/artificial-intelligence", "title": "CNIL publishes guidance on lawful bases for AI training data scraping", "body": "The French CNIL released its long-awaited Q&A on lawful bases for training AI models, including a framework for legitimate-interest assessments and a structured DPIA template for foundation-model providers. A companion checklist on web-scraping operations highlights heightened scrutiny for biometric and special-category data. [Source tier A · Verdict: tight · Action: brief]", "why": "Provides the most practical European DPA blueprint to date for AI training-data DPIAs. Direct utility for Toqan and any OpCo embedding fine-tuned models. Reduces interpretive ambiguity for upcoming OpCo data-processing-agreement reviews.", "co": "Toqan · all OpCos with model fine-tuning", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "uk-uk-dsit-consultation-on-ai-copyright-text-and-data-mining-exception-closes-ai11", "theme": "ai-news", "catLabel": "AI Policy", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "DSIT", "url": "https://www.gov.uk/government/organisations/department-for-science-innovation-and-technology", "title": "UK DSIT consultation on AI copyright text-and-data-mining exception closes", "body": "The UK Department for Science, Innovation and Technology closed consultation on its proposed text-and-data-mining (TDM) exception for AI training, including the opt-out architecture and rights-reservation register design. There is significant divergence from EU CDSM Article 4 framing. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct read-across for IP indemnities flowing through Anthropic, OpenAI and Google Gemini contracts used by Prosus OpCos. The UK opt-out architecture creates new vendor-disclosure and rights-clearance obligations.", "co": "Toqan · Stack Overflow · all OpCo AI vendors", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "us-openai-to-grant-eu-access-to-gpt-5-5-cyber-anthropic-still-holding-out-on-mythos-ai26", "theme": "ai-news", "catLabel": "AI Launches", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "OpenAI / EU AI Office", "url": "https://openai.com/index/", "title": "OpenAI to grant EU access to GPT-5.5-Cyber; Anthropic still holding out on Mythos", "body": "OpenAI announced that it will grant the EU institutional access to GPT-5.5-Cyber, a cybersecurity-focused variant of its latest model. This is reported as part of evolving frontier-model evaluation programmes with the EU AI Office. Anthropic has so far not offered an equivalent access agreement for its Mythos cyber-tier. [Source tier B · Verdict: medium · Action: monitor]", "why": "Signals that the EU AI Office is becoming a real third-party evaluator with vendor-specific deals. Affects how OpCos justify their AI sourcing (Anthropic-first stance) when government-access programmes start influencing procurement preferences.", "co": "Toqan · all OpCos", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-dg-comp-closes-preliminary-review-of-cloud-ai-vertical-bundling-complaints-ai37", "theme": "ai-news", "catLabel": "AI Policy", "country": "EU", "countryLabel": "EU European Union", "risk": "high", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "DG COMP", "url": "https://ec.europa.eu/competition/", "title": "DG COMP closes preliminary review of cloud-AI vertical bundling complaints", "body": "DG COMP closed its preliminary review of complaints alleging cloud-AI vertical bundling by hyperscalers (Microsoft-OpenAI, Amazon-Anthropic, Google-Gemini). No Phase 1 was opened; the file remains on monitoring. The sectoral-inquiry option has been kept open. [Source tier A · Verdict: tight · Action: brief]", "why": "Determines the competition environment for OpCo cloud-AI procurement. Read-through to M02 (digital markets, sector regulation and state aid). Confirms current vendor architecture is not imminently disrupted.", "co": "all OpCo cloud-AI procurement", "owner": "Group AI Counsel", "ownerTeam": "Group Legal", "rule": "Rule 18"}, {"id": "br-anpd-issues-technical-regulation-on-ai-training-and-lgpd-compatibility-ai51", "theme": "ai-news", "catLabel": "AI Policy", "country": "BR", "countryLabel": "BR Brazil", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "ANPD", "url": "https://www.gov.br/anpd/", "title": "ANPD issues technical regulation on AI training and LGPD compatibility", "body": "Brazil's ANPD published a technical regulation on AI training data and LGPD compatibility, including lawful-basis layering, scrape-on-public-data conditions, and DPIA-equivalent templates. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for iFood, PayU LatAm, and any OpCo using Brazilian-user data in AI training. Templates here will be reused across LatAm.", "co": "iFood · PayU LatAm", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "uk-ico-fines-south-staffordshire-water-963-900-after-cl0p-cyberattack-pr02", "theme": "privacy", "catLabel": "Privacy & Data", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "high", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "UK ICO", "url": "https://ico.org.uk/", "title": "ICO fines South Staffordshire Water £963,900 after Cl0p cyberattack", "body": "The ICO fined South Staffordshire Plc £963,900 (after a 40% early-admission discount) after a phishing-led intrusion went undetected for 20 months and 4.1 TB of data was leaked. The ICO found weak privilege management, only 5% of the IT estate logged, and use of obsolete software including Windows Server 2003. [Source tier A · Verdict: tight · Action: brief]", "why": "UK regulator hard line on security-failure cases under UK GDPR. Sets a precision benchmark for what appropriate technical and organisational measures must look like. Direct relevance for OpCos with legacy infra (PayU, Movile, OLX) and for vendor-risk reviews of legal-tech and ops vendors.", "co": "PayU · OLX · Movile · vendor stack", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "us-instructure-canvas-lms-breach-up-to-275m-users-at-8-800-institutions-pr03", "theme": "privacy", "catLabel": "Privacy & Data", "country": "US", "countryLabel": "US United States", "risk": "high", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "Inside Higher Ed / Instructure", "url": "https://www.insidehighered.com/", "title": "Instructure Canvas LMS breach: up to 275M users at ~8,800 institutions", "body": "A ShinyHunters attack on Instructure's Canvas LMS exposed up to 275 million student and teacher records (names, emails, IDs, private messages) at 8,809 institutions worldwide. Instructure paid a ransom to halt a 3.65 TB leak by 12 May. It is the largest education-sector breach on record. [Source tier A · Verdict: tight · Action: escalate]", "why": "Textbook EdTech vendor-risk case. Raises the supply-chain DPIA bar for Prosus EdTech (Stack Overflow, Brainly, GoodHabitz, Codecademy). Triggers obligations under DPDP, GDPR Art. 33 and 34, and US state breach laws across the EdTech footprint.", "co": "Stack Overflow · Brainly · GoodHabitz · Codecademy", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "cn-cac-issues-standard-contractual-clauses-2-0-for-outbound-personal-information-transfers", "theme": "privacy", "catLabel": "Privacy & Data", "country": "CN", "countryLabel": "CN China", "risk": "high", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "CAC", "url": "http://www.cac.gov.cn/", "title": "CAC issues standard contractual clauses 2.0 for outbound personal-information transfers", "body": "China's Cyberspace Administration issued updated standard contractual clauses (SCCs 2.0) for outbound personal-information transfers, with a one-year transition window for in-flight transfers under the 1.0 SCCs. [Source tier A · Verdict: tight · Action: escalate]", "why": "Direct relevance for any Tencent-side data architecture touching Prosus or vendor-stack data. Cross-border transfer templates need to be re-papered in the next twelve months.", "co": "Tencent NAV exposure · vendor stack", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-european-commission-publishes-data-act-implementation-faq-v2-pr49", "theme": "privacy", "catLabel": "Privacy & Data", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "European Commission", "url": "https://digital-strategy.ec.europa.eu/en/policies/data-act", "title": "European Commission publishes Data Act implementation FAQ v2", "body": "The European Commission published Data Act implementation FAQ v2, ahead of the September 2026 applicability date. The FAQ clarifies in-scope products, B2B data-access flows, and connected-device data definitions. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct relevance for OpCos whose products are caught by the Data Act (potential JET/OLX product surfaces). Engineering teams should map data-access flows now.", "co": "JET · OLX", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "uk-shein-v-temu-uk-trial-opens-temu-drops-defence-to-2-300-photos-ip02", "theme": "ip", "catLabel": "IP & Brand", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "high", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "England & Wales High Court", "url": "https://www.judiciary.uk/", "title": "Shein v. Temu UK trial opens — Temu drops defence to 2,300 photos", "body": "A two-week trial opened in London on 11 May. Shein's barrister told the court that Temu had used around 2,300 Shein product photos on an industrial scale. Temu effectively abandoned its defence on the disputed images, leaving the court to focus on damages, injunctions, and Temu's anti-competitive counterclaim. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct read-across for OLX, eMAG and other Prosus marketplaces. The UK High Court is signalling appetite to grant injunctions against marketplaces that host seller-copied imagery. It raises the bar for proactive image-fingerprinting controls and seller-onboarding IP checks.", "co": "OLX · eMAG · iFood · Despegar", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "in-delhi-hc-issues-ruling-on-john-doe-order-against-ai-deepfake-platforms-ip50", "theme": "ip", "catLabel": "IP & Brand", "country": "IN", "countryLabel": "IN India", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "Delhi High Court", "url": "https://delhihighcourt.nic.in/", "title": "Delhi HC issues ruling on John Doe order against AI deepfake platforms", "body": "The Delhi High Court issued a ruling on a John Doe order against AI deepfake platforms, with detailed reasoning on interim-injunction architecture in personality-rights matters. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance to OLX India, PayU India and any Prosus product hosting user-generated content.", "co": "OLX India · PayU India", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "us-litera-announces-new-partnerships-in-document-automation-and-clm-lo03", "theme": "legal-ops", "catLabel": "Legal Tech M&A", "country": "US", "countryLabel": "US United States", "risk": "low", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "Litera", "url": "https://www.litera.com/", "title": "Litera announces new partnerships in document automation and CLM", "body": "Litera announced new partnerships in document automation and contract-lifecycle management, broadening its enterprise-legal stack footprint with three integrations. [Source tier B · Verdict: loose · Action: monitor]", "why": "Useful baseline for document-automation tooling decisions at Group Legal level.", "co": "Group Legal Ops", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "us-acc-publishes-2026-afa-trends-report-fixed-fee-adoption-rates-up-22-lo25", "theme": "legal-ops", "catLabel": "Outside Counsel", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "ACC", "url": "https://www.acc.com/", "title": "ACC publishes 2026 AFA Trends report — fixed-fee adoption rates up 22%", "body": "The ACC published its 2026 Alternative Fee Arrangements report, showing fixed-fee adoption rates up 22% year-over-year. Capped-fee and value-based arrangements are growing in transactional matters. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct benchmark for OpCo law-firm panel rationalisation and AFA strategy.", "co": "OpCo law-firm panel management", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "us-acc-publishes-2026-chief-legal-officer-benchmarks-cost-per-matter-and-ai-roi-lo40", "theme": "legal-ops", "catLabel": "KPIs", "country": "US", "countryLabel": "US United States", "risk": "low", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "ACC", "url": "https://www.acc.com/", "title": "ACC publishes 2026 Chief Legal Officer benchmarks — cost-per-matter and AI ROI", "body": "The Association of Corporate Counsel published 2026 CLO benchmarks, including detailed cost-per-matter, AI ROI metrics, and outside-counsel spend. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct benchmark for Group Legal Ops budget strategy.", "co": "Group Legal Ops", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "us-harvard-center-on-the-legal-profession-2026-in-house-leaders-survey-lo50", "theme": "legal-ops", "catLabel": "Legal Tech", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-11", "dateLabel": "11 May 2026", "source": "Harvard CLP", "url": "https://clp.law.harvard.edu/", "title": "Harvard Center on the Legal Profession: 2026 In-House Leaders Survey", "body": "Harvard's Center on the Legal Profession published the 2026 In-House Leaders Survey, with detailed data on AI deployment, panel-management strategy, and budget priorities. [Source tier B · Verdict: medium · Action: brief]", "why": "Useful peer benchmark for Group Legal strategy at Prosus.", "co": "Group Legal strategy", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "br-brazil-pl-2338-2023-ai-bill-reaches-c-mara-final-vote-stage-cade-retains-competition-ro", "theme": "ai-news", "catLabel": "AI Policy", "country": "BR", "countryLabel": "BR Brazil", "risk": "med", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "Brazil Senate / Congress", "url": "https://www25.senado.leg.br/web/atividade/materias/-/materia/157233", "title": "Brazil PL 2338/2023 (AI Bill) reaches Câmara final-vote stage; CADE retains competition role", "body": "Brazil's PL 2338/2023 AI Bill cleared committee revisions in the Câmara dos Deputados and is scheduled for final vote. ANPD retains coordination authority, CADE explicitly carves out AI-related competition matters, and sectoral regulators retain market-specific competence. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for iFood and PayU LatAm. The ANPD-CADE-sectoral split clarifies which regulator OpCos engage on AI deployment questions. iFood is already in CADE TCC scope, and the Bill's competition framing reinforces ongoing Rule 11 monitoring.", "co": "iFood · PayU LatAm", "owner": "Group AI Counsel", "ownerTeam": "Group Legal", "rule": "Rule 11"}, {"id": "in-delhi-hc-extends-personality-rights-protection-to-ai-cloned-voice-and-gait-ai20", "theme": "ai-news", "catLabel": "AI Policy", "country": "IN", "countryLabel": "IN India", "risk": "high", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "Delhi High Court", "url": "https://delhihighcourt.nic.in/", "title": "Delhi HC extends personality-rights protection to AI-cloned voice and gait", "body": "Justice Mini Pushkarna issued an interim order requiring platforms to remove an AI-generated deepfake and binding platforms to disclose subscriber data of uploaders within three weeks. The ruling extends personality and publicity rights to AI-cloned voice, gait, oratorical cadence and vocabulary. [Source tier A · Verdict: tight · Action: brief]", "why": "Strongest Indian personality-rights precedent for AI deepfakes to date. Heightens compliance risk for OLX India, PayU India, and any Prosus product hosting user-generated content. Drives proactive deepfake-monitoring obligations and disclosure-of-uploader SLAs.", "co": "OLX India · PayU India · Swiggy · PharmEasy", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "fr-mistral-releases-mistral-large-3-with-extended-european-language-coverage-ai29", "theme": "ai-news", "catLabel": "AI Launches", "country": "FR", "countryLabel": "FR France", "risk": "med", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "Mistral AI", "url": "https://mistral.ai/news/", "title": "Mistral releases Mistral Large 3 with extended European-language coverage", "body": "Mistral AI released Mistral Large 3, the next iteration of its flagship multilingual model, with extended European-language coverage (notably Romanian, Polish, Czech and Greek) and a refreshed Responsible AI Charter. Open weights are available for non-commercial research. [Source tier B · Verdict: medium · Action: monitor]", "why": "Provides a credible European-sovereign option for eMAG Romania, eMAG Bulgaria and Hungary, OLX CEE, and any consumer-facing OpCo serving smaller European languages where Anthropic and OpenAI coverage is weaker.", "co": "eMAG · OLX CEE · Brainly EU", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "in-delhi-hc-grants-shashi-tharoor-personality-rights-protection-vs-ai-deepfakes-pr05", "theme": "privacy", "catLabel": "Privacy & Data", "country": "IN", "countryLabel": "IN India", "risk": "high", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "Delhi High Court", "url": "https://delhihighcourt.nic.in/", "title": "Delhi HC grants Shashi Tharoor personality-rights protection vs AI deepfakes", "body": "Justice Mini Pushkarna issued an interim order requiring X to remove an AI-generated deepfake of MP Shashi Tharoor and binding platforms to disclose subscriber data of uploaders within three weeks. The ruling extends personality and publicity rights to AI-cloned voice, gait, oratorical cadence and vocabulary. [Source tier A · Verdict: tight · Action: brief]", "why": "Strongest Indian personality-rights precedent for AI deepfakes to date. Heightens compliance risk for OLX India, PayU India, and any Prosus AI product hosting UGC. Drives proactive deepfake monitoring obligations and disclosure-of-uploader SLAs.", "co": "OLX India · PayU India · Swiggy · PharmEasy", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-edpb-adopts-guidelines-on-the-interplay-of-gdpr-with-the-data-act-and-dga-pr43", "theme": "privacy", "catLabel": "Privacy & Data", "country": "EU", "countryLabel": "EU European Union", "risk": "high", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "EDPB", "url": "https://www.edpb.europa.eu/", "title": "EDPB adopts guidelines on the interplay of GDPR with the Data Act and DGA", "body": "The EDPB adopted guidelines on the interplay of GDPR with the Data Act and the Data Governance Act, clarifying controllership questions for data-sharing intermediaries and B2B data-access rights. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for OpCos exposed to Data Act business-user rights (OLX, eMAG, JET, PayU). Affects how partner data-access architectures are designed.", "co": "OLX · eMAG · JET · PayU", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-cjeu-c-xxx-26-referral-on-platform-liability-under-dsa-article-6-and-ip-enforcement-ip1", "theme": "ip", "catLabel": "IP & Brand", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "CJEU", "url": "https://curia.europa.eu/", "title": "CJEU C-XXX/26 referral on platform liability under DSA Article 6 and IP enforcement", "body": "A new CJEU referral asks how DSA Article 6 (hosting safe harbour) and DSA Article 17 (active platform measures) interact with intellectual-property enforcement obligations under the Enforcement Directive. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance to OLX, eMAG and other marketplace OpCos. Will define the cost and shape of IP-enforcement workflows on marketplaces.", "co": "OLX · eMAG · marketplaces", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "uk-lexisnexis-acquires-a-drafting-ai-startup-to-bolster-lexis-ai-lo04", "theme": "legal-ops", "catLabel": "Legal Tech M&A", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "low", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "LexisNexis", "url": "https://www.lexisnexis.com/", "title": "LexisNexis acquires a Drafting AI startup to bolster Lexis+ AI", "body": "LexisNexis acquired a drafting-AI startup, accelerating the build-out of Lexis+ AI's drafting and review capabilities. The acquisition is the third in nine months in the Lexis+ AI roadmap. [Source tier B · Verdict: loose · Action: monitor]", "why": "Indirect Prosus relevance; informs vendor-stack tooling evaluation.", "co": "Group Legal · OpCo legal", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "uk-law-society-issues-updated-guidance-on-use-of-generative-ai-by-solicitors-lo18", "theme": "legal-ops", "catLabel": "Legal AI", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "med", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "Law Society of England and Wales", "url": "https://www.lawsociety.org.uk/", "title": "Law Society issues updated guidance on use of generative AI by solicitors", "body": "The Law Society of England and Wales issued updated guidance on solicitors' use of generative AI. The guidance addresses confidentiality, accuracy, and supervision responsibilities. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for UK-side law-firm panel management at OpCo level. Reflects in-house team accountability framework.", "co": "Group Legal Ops · OpCo UK legal", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "eu-commission-publishes-action-plan-for-justice-digitalisation-implications-for-in-house-l", "theme": "legal-ops", "catLabel": "Legal Tech", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-10", "dateLabel": "10 May 2026", "source": "European Commission", "url": "https://commission.europa.eu/", "title": "Commission publishes Action Plan for Justice Digitalisation — implications for in-house", "body": "The European Commission published an updated Action Plan for Justice Digitalisation, with implications for in-house teams using AI tools in cross-border matters. [Source tier B · Verdict: medium · Action: monitor]", "why": "Direct relevance to Group Legal Ops cross-border matter management.", "co": "Group Legal Ops · cross-border matter management", "owner": "K. Maleevska", "ownerTeam": "Legal Ops"}, {"id": "de-germany-dsk-position-paper-on-generative-ai-in-public-administration-touches-employer-a", "theme": "ai-news", "catLabel": "AI Policy", "country": "DE", "countryLabel": "DE Germany", "risk": "med", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "BfDI / DSK", "url": "https://www.bfdi.bund.de/", "title": "Germany DSK position paper on generative AI in public administration touches employer-AI", "body": "Germany's Conference of Independent Federal and State Data Protection Authorities (DSK) issued a position paper on generative AI in public administration with cross-applicability to private-sector employer monitoring. The paper re-emphasises lawful-basis layering when employees interact with generative-AI assistants on customer data and signals that works-council consultation is expected for most deployments. [Source tier B · Verdict: medium · Action: monitor]", "why": "Affects Toqan deployment patterns in the German OpCo footprint (Brainly DACH, GoodHabitz). Sets a high-water mark for employee-facing AI rollout — expect employer DPIAs and works-council consultation requirements to be reused across the EU.", "co": "Brainly · GoodHabitz · OpCo internal AI rollouts", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "us-nist-caisi-publishes-pre-deployment-evaluation-of-deepseek-v4-pro-ai12", "theme": "ai-news", "catLabel": "AI Policy", "country": "US", "countryLabel": "US United States", "risk": "high", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "NIST CAISI", "url": "https://www.nist.gov/aisi", "title": "NIST CAISI publishes pre-deployment evaluation of DeepSeek V4 Pro", "body": "CAISI's evaluation concludes DeepSeek V4 Pro is the most capable PRC AI model it has assessed, roughly on par with frontier US models on self-reported benchmarks but lagging on CAISI's own benchmark suite. Pricing significantly undercuts Anthropic, OpenAI and Google equivalents. [Source tier A · Verdict: tight · Action: brief]", "why": "US-government framing of a Chinese frontier model that is open-weight and significantly cheaper. Stack-relevance: V4 Pro is a credible Toqan-side benchmark and a downward-pressure point on Anthropic and OpenAI cost; M01 IP risk profile differs from US models (Chinese training data, sovereignty).", "co": "Toqan · vendor stack", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-cjeu-referral-on-ai-act-and-gdpr-overlap-in-employer-monitoring-ai32", "theme": "ai-news", "catLabel": "AI Litigation", "country": "EU", "countryLabel": "EU European Union", "risk": "high", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "CJEU", "url": "https://curia.europa.eu/", "title": "CJEU referral on AI Act and GDPR overlap in employer monitoring", "body": "A national labour court referred preliminary questions to the CJEU on the overlap between AI Act prohibited-practices (Article 5) and GDPR Article 22, in the context of AI-augmented productivity monitoring of employees. This is the first major reference on that overlap. [Source tier A · Verdict: tight · Action: brief]", "why": "Sets up a foundational ruling that will define how OpCos roll out Toqan productivity tooling to employees. An implementation freeze may be advisable on certain monitoring features until the ruling drops.", "co": "Toqan · all OpCo HR AI rollouts", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "uk-cma-publishes-final-report-on-foundation-model-market-study-no-mir-ai38", "theme": "ai-news", "catLabel": "AI Policy", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "med", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "CMA", "url": "https://www.gov.uk/cma", "title": "CMA publishes final report on foundation-model market study; no MIR", "body": "The UK CMA published the final report of its foundation-models market study, concluding that no Market Investigation Reference is warranted at this point. The report identifies six concerns to monitor: access to inputs, lock-in, partnerships, downstream-market effects, transparency, and consumer harms. [Source tier A · Verdict: medium · Action: brief]", "why": "Removes the prospect of a UK MIR escalation in the short term, stabilising the OpCo cloud-AI procurement environment in the UK. Watch the six concerns as the live monitoring agenda.", "co": "OLX UK · PayU UK · cloud-AI procurement", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "uk-pra-discussion-paper-on-ai-in-financial-services-supervisory-statement-update-timing-an", "theme": "ai-news", "catLabel": "AI Deployment", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "low", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "Bank of England / PRA", "url": "https://www.bankofengland.co.uk/", "title": "PRA discussion paper on AI in financial services — Supervisory Statement update timing announced", "body": "The Bank of England's Prudential Regulation Authority published a discussion paper on AI in banking and insurance, signalling timing for a Supervisory Statement update. It touches model risk management, third-party risk management, and operational-resilience implications. [Source tier B · Verdict: medium · Action: monitor]", "why": "Direct relevance to PayU UK and OpCos that handle financial-services-adjacent flows. The Supervisory Statement update timing will dictate  "ownerTeam": "Group Legal"}, {"id": "ro-romania-anspdcp-closes-investigation-into-a-marketplace-operator-s-breach-handling-pr20", "theme": "privacy", "catLabel": "Privacy & Data", "country": "RO", "countryLabel": "RO Romania", "risk": "low", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "ANSPDCP Romania", "url": "https://www.dataprotection.ro/", "title": "Romania ANSPDCP closes investigation into a marketplace operator's breach handling", "body": "Romania's ANSPDCP closed an investigation into a marketplace operator's breach-handling protocols with a corrective decision and an administrative penalty. The decision is reviewable for general application across e-commerce. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for eMAG (Romania-incorporated). Templates from the decision should be reviewed against eMAG's IR playbook.", "co": "eMAG", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "za-south-africa-information-regulator-concludes-investigation-into-a-major-retailer-breach", "theme": "privacy", "catLabel": "Privacy & Data", "country": "ZA", "countryLabel": "ZA South Africa", "risk": "med", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "Information Regulator", "url": "https://inforegulator.org.za/", "title": "South Africa Information Regulator concludes investigation into a major retailer breach", "body": "South Africa's Information Regulator concluded an investigation into a major retailer breach under POPIA. The conclusion details breach-notification failures and inadequate security safeguards, with a corrective-action plan attached. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct relevance to Property24 and any ZA-incorporated OpCo. POPIA enforcement is maturing — the templates here should be incorporated into IR playbooks.", "co": "Property24 · ZA reporting", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "uk-ico-refreshes-guidance-on-adtech-and-real-time-bidding-under-uk-gdpr-pr46", "theme": "privacy", "catLabel": "Privacy & Data", "country": "UK", "countryLabel": "UK United Kingdom", "risk": "med", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "UK ICO", "url": "https://ico.org.uk/", "title": "ICO refreshes guidance on AdTech and Real-Time Bidding under UK GDPR", "body": "The UK ICO refreshed its guidance on AdTech and Real-Time Bidding under UK GDPR, after multi-year engagement with industry. The refresh sets enforcement priorities for 2026. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for OLX UK, eMAG UK and any OpCo ad-monetisation flow touching UK users.", "co": "OLX UK · eMAG UK · ad-monetisation", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "us-turow-5-publishers-incl-elsevier-sue-meta-over-llama-training-data-ip04", "theme": "ip", "catLabel": "IP & Brand", "country": "US", "countryLabel": "US United States", "risk": "high", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "S.D.N.Y.", "url": "https://nysd.uscourts.gov/", "title": "Turow + 5 publishers (incl. Elsevier) sue Meta over Llama training data", "body": "Publishers (Scott Turow, Macmillan, McGraw Hill, Elsevier and others) filed a putative class action in S.D.N.Y. alleging that Meta knowingly torrented copyrighted books and scientific papers from LibGen and Anna's Archive to train Llama. The complaint alleges that Zuckerberg personally authorised abandoning licensing in April 2023. [Source tier A · Verdict: tight · Action: brief]", "why": "Significantly expands the AI training-data litigation perimeter to scientific publishers. Relevant for Prosus EdTech (Stack Overflow, GoodHabitz, Brainly, Udemy content libraries). Signals widening copyright exposure across any open-weight model in OpCo products.", "co": "Stack Overflow · GoodHabitz · Brainly · Udemy", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "eu-euipo-publishes-2026-ip-crime-and-innovation-threat-assessment-ip13", "theme": "ip", "catLabel": "IP & Brand", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "EUIPO", "url": "https://www.euipo.europa.eu/", "title": "EUIPO publishes 2026 IP Crime and Innovation Threat Assessment", "body": "The EU Intellectual Property Office published the 2026 IP Crime and Innovation Threat Assessment, with a dedicated focus on counterfeit goods sold through online marketplaces and the rise of AI-generated infringing content. [Source tier A · Verdict: tight · Action: brief]", "why": "Direct relevance for OLX, eMAG and other Prosus marketplaces. Sets the benchmark expectations for marketplace seller-onboarding and content-control infrastructure.", "co": "OLX · eMAG", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "in-indian-patent-office-issues-guidance-on-patent-eligibility-for-ai-related-inventions-ip", "theme": "ip", "catLabel": "IP & Brand", "country": "IN", "countryLabel": "IN India", "risk": "high", "date": "2026-05-09", "dateLabel": "9 May 2026", "source": "Indian Patent Office / Delhi HC", "url": "https://ipindia.gov.in/", "title": "Indian Patent Office issues guidance on patent eligibility for AI-related inventions", "body": "The Indian Patent Office issued guidance on patent eligibility for AI-related inventions, including computer-implemented-invention exclusions and the technical-effect test architecture. [Source tier B · Verdict: medium · Action: brief]", "why": "Useful for Group Tech patent posture and any OpCo with India-based engineering footprint patenting AI-related innovations.", "co": "Group Tech patent posture", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "eu-commission-report-on-article-8-dsm-directive-out-of-commerce-works-implementation-ip28", "theme": "ip", "catLabel": "IP & Brand", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-09", "dateLabel": "9 May 2026", "sourc ry but with strong enforcement signalling. [Source tier B · Verdict: medium · Action: monitor]", "why": "Korea is consolidating as the leading APAC privacy authority on AI. Sets the bar for any OpCo expansion into the Korean market and for vendor-stack reviews where Korean data flows through Anthropic, OpenAI or Google.", "co": "vendor stack · OpCo expansion review", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "us-meta-open-sources-llama-4-behemoth-research-preview-non-commercial-licence-in-eu-ai30", "theme": "ai-news", "catLabel": "AI Launches", "country": "US", "countryLabel": "US United States", "risk": "low", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "Meta", "url": "https://about.meta.com/", "title": "Meta open-sources Llama 4 Behemoth research preview; non-commercial licence in EU", "body": "Meta released a research preview of Llama 4 Behemoth, its largest open-weights model to date. The licence is non-commercial-only in the EU pending GPAI Code of Practice alignment. Commercial use is allowed elsewhere under the standard Llama Community Licence. [Source tier C · Verdict: loose · Action: monitor]", "why": "EU non-commercial caveat blocks production use in the OpCo footprint inside the EU. Relevant for OpCo open-weights evaluation but not for production deployment in the EU. Watch the EU commercial licence carve-out as the GPAI Code lands.", "co": "Toqan research · OLX EU exclusion", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "fr-french-authors-syndicate-brings-article-102-ip-claim-against-a-major-llm-provider-ai33", "theme": "ai-news", "catLabel": "AI Litigation", "country": "FR", "countryLabel": "FR France", "risk": "med", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "Tribunal Judiciaire de Paris", "url": "https://www.tribunal-de-paris.justice.fr/", "title": "French authors syndicate brings Article 102 + IP claim against a major LLM provider", "body": "A French authors' syndicate filed a joint Article 102 (abuse of dominance) and IP infringement claim against a major LLM provider, seeking interim measures to halt French-language training-data ingestion. A hearing on interim relief is set for late May. [Source tier A · Verdict: tight · Action: escalate]", "why": "First Article 102 framing of AI training-data harvesting in a European court. Cross-monitor link to M02 dominance and M01 IP. Direct vendor-stack relevance for any OpCo whose product uses the named model.", "co": "Toqan · Stack Overflow · vendor stack", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "sg-mas-publishes-veritas-toolkit-for-ai-in-financial-services-ai42", "theme": "ai-news", "catLabel": "AI Deployment", "country": "SG", "countryLabel": "SG Singapore", "risk": "low", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "Monetary Authority of Singapore", "url": "https://www.mas.gov.sg/", "title": "MAS publishes Veritas+ toolkit for AI in financial services", "body": "MAS released the Veritas+ toolkit, an updated assurance toolkit for fairness, ethics, accountability and transparency in AI for financial services. The toolkit is open-source and aligned with IMDA AI Verify. [Source tier C · Verdict: loose · Action: monitor]", "why": "Useful as a model fairness and transparency assurance pipeline that can be ported to OpCo lending-AI governance (PayU LatAm credit, BNPL).", "co": "PayU LatAm · BNPL governance", "owner": "Group AI Counsel", "ownerTeam": "Group Legal"}, {"id": "us-nyt-v-openai-hearing-on-motion-to-compel-discovery-of-training-data-composition-ai49", "theme": "ai-news", "catLabel": "AI Litigation", "country": "US", "countryLabel": "US United States", "risk": "med", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "S.D.N.Y.", "url": "https://nysd.uscourts.gov/", "title": "NYT v. OpenAI hearing on motion to compel discovery of training-data composition", "body": "Judge Stein in S.D.N.Y. heard argument on the New York Times' motion to compel discovery of training-data composition and retrieval-augmentation logs. An order is expected within four weeks and will set the procedural posture for downstream AI training-data discovery. [Source tier A · Verdict: tight · Action: brief]", "why": "The discovery framework here will be reused in every subsequent AI training-data case, including those touching Prosus vendor stack. Anthropic, OpenAI and Google indemnity language should be reviewed against the discovery contours this order will set.", "co": "Toqan · Stack Overflow · all AI vendors", "owner": "Tara Harris", "ownerTeam": "Group IP"}, {"id": "it-garante-issues-final-guidance-on-ai-generated-content-disclosure-under-dsa-article-35-p", "theme": "privacy", "catLabel": "Privacy & Data", "country": "IT", "countryLabel": "IT Italy", "risk": "med", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "Garante", "url": "https://www.garanteprivacy.it/", "title": "Garante issues final guidance on AI-generated content disclosure under DSA Article 35", "body": "The Italian Garante issued final guidance on AI-generated content disclosure obligations under DSA Article 35 alongside national consumer-protection rules. The guidance includes a labelling-disclosure flow chart and platform-side audit-log requirements. [Source tier A · Verdict: medium · Action: brief]", "why": "Direct relevance for OLX Italy, eMAG and any Italian-facing UGC platform. Sets the operational expectation for AI-content labelling alongside the EU AI Act Article 50 transparency obligations.", "co": "OLX Italy · eMAG · UGC platforms", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "tr-t-rkiye-kvkk-refreshes-data-controller-registration-thresholds-pr36", "theme": "privacy", "catLabel": "Privacy & Data", "country": "TR", "countryLabel": "TR Türkiye", "risk": "low", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "KVKK", "url": "https://www.kvkk.gov.tr/", "title": "Türkiye KVKK refreshes data-controller registration thresholds", "body": "Türkiye's KVKK refreshed the data-controller registration thresholds and clarified the procedural steps for foreign-based controllers with Türkiye-user footprint. [Source tier B · Verdict: medium · Action: brief]", "why": "Direct relevance for iyzico and any cross-border-flow architecture touching Türkiye-user data.", "co": "iyzico", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-edps-publishes-opinion-on-eudi-wallet-rollout-and-personal-data-minimisation-pr44", "theme": "privacy", "catLabel": "Privacy & Data", "country": "EU", "countryLabel": "EU European Union", "risk": "med", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "EDPS", "url": "https://edps.europa.eu/", "title": "EDPS publishes opinion on EUDI Wallet rollout and personal-data minimisation", "body": "The EDPS published an opinion on the European Digital Identity Wallet (EUDI Wallet) rollout and personal-data minimisation, focused on selective disclosure and unlinkability guarantees. [Source tier A · Verdict: medium · Action: brief]", "why": "Affects future identity flows for OpCo onboarding and KYC, particularly PayU and iyzico KYC stacks.", "co": "PayU · iyzico KYC", "owner": "Group Privacy Counsel", "ownerTeam": "Group Legal"}, {"id": "eu-cjeu-c-xxx-26-referral-on-data-subject-rights-extension-to-ai-training-corpora-pr50", "theme": "privacy", "catLabel": "Privacy & Data", "country": "EU", "countryLabel": "EU European Union", "risk": "high", "date": "2026-05-08", "dateLabel": "8 May 2026", "source": "CJEU", "url": "https://curia.europa.eu/", "title": "CJEU C-XXX/26 referral on data-subject-rights extension to AI training corpora", "body": "A new CJEU referral asks whether GDPR data-subject rights (access, erasure, rectification) extend to training corpora held by AI providers. The referral is from a national court following a string of subject-access requests. [Source tier A · Verdict: tight · Action: brief]", "why": "Foundational referral with st
