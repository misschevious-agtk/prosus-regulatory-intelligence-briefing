# Entity gazetteer used by lib_entities.py
#
# Each entry shape:
#   - name:        canonical display name (what gets written into the finding)
#   - type:        regulator | court | company | bigtech | financial_regulator
#   - jurisdiction: ISO-like code; "EU" / "INT" for supranational; "BR", "IN" etc.
#   - aliases:     alternative strings to match against the candidate's text.
#                  Acronyms must be standalone words (matcher enforces word-boundary
#                  for tokens ≤ 8 chars), so don't worry about "EU" matching inside
#                  "Eulerian" — that's handled in code.
#
# Prosus portfolio companies are NOT listed here. They're parsed at runtime from
# portfolios.md so this gazetteer stays Prosus-agnostic (and any team that forks
# the architecture can drop in their own portfolio without editing this file).

