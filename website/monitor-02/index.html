  --r-low-fg:  #007459;

  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 999px;
  --gradient: linear-gradient(90deg, var(--ox-dark) 0%, var(--ar-light) 50%, var(--li-dark) 100%);

  --text-primary:   #1B0838;

html[data-theme="dark"] {
  --bg-page:   #0F0420;
  --bg-card:   #1B0C36;

  --tint-ox:   #3D2911;
  --tint-ch:   #0E3A30;
  --text-primary:   #F5EEFA;
  --text-secondary: #B8A8D0;
  --text-tertiary:  #8C7AA8;
  --border-soft:    rgba(255,255,255,.08);
  --border-strong:  rgba(255,255,255,.20);

html[data-theme="clean"] {

  --bg-card:   #FFFFFF;

  --tint-ox:   #FCF4E8;

@media (prefers-color-scheme: dark) {

    --bg-page: #0F0420; --bg-card: #1B0C36; --bg-soft: #261548;

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: Verdana, Geneva, Tahoma, sans-serif;
  font-size: 16px; line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg-page);
  background-image: var(--bg-ambient);
  background-attachment: fixed;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

.topbar {
  position: sticky; top: 0; z-index: 60;
  padding: 14px 28px;
  display: flex; align-items: center; gap: 20px;
  background: var(--bg-card);
  border-bottom: 0.5px solid var(--border-soft);
  backdrop-filter: blur(10px);
}
.brand { display: flex; align-items: center; gap: 14px; min-width: 0; flex-shrink: 0; }
.brand-link { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  font-size: 18px; font-weight: 800; letter-spacing: -0.5px;
  background: var(--gradient);
  -webkit-background-clip: text; background-clip: text;
  color: transparent; white-space: nowrap;
}
.brand-sep { width: 1px; height: 22px; background: var(--border-soft); }
.brand-product { font-size: 13px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
.brand-product b { color: var(--text-primary); font-weight: 600; }

.live-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: var(--radius-full);
  font-size: 12px; font-weight: 500;
  background: var(--tint-ch); color: var(--ch-dark);
  border: 0.5px solid var(--border-soft);
}
.live-pill.calibrating { background: var(--tint-ox); color: var(--ox-prime); }
.live-pill.pending     { background: var(--tint-li); color: var(--li-prime); }
.live-pill.dormant     { background: var(--bg-soft); color: var(--text-tertiary); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 0 currentColor; animation: pulse 2s infinite; }
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(0,172,142,.55); }
  70%  { box-shadow: 0 0 0 10px rgba(0,172,142,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,172,142,0); }
}

.search { flex: 1; max-width: 380px; display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg-soft); border: 0.5px solid var(--border-soft); border-radius: var(--radius-md); color: var(--text-secondary); }
.search input { flex: 1; background: transparent; border: 0; outline: 0; color: var(--text-primary); font-size: 13.5px; font-family: inherit; }
.search input::placeholder { color: var(--text-tertiary); }

.counters { display: flex; gap: 22px; align-items: center; }
.counter .num { font-size: 19px; font-weight: 700; line-height: 1; color: var(--text-primary); font-variant-numeric: tabular-nums; }
.counter .num.high { color: var(--r-high-fg); }
.counter .num.med  { color: var(--r-med-fg); }
.counter .lbl { font-size: 10px; letter-spacing: 1.2px; color: var(--text-tertiary); text-transform: uppercase; margin-top: 4px; }

.theme-toggle { position: relative; display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: var(--radius-full); background: var(--bg-soft); color: var(--text-secondary); border: 0.5px solid var(--border-soft); font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.theme-toggle::before { content: ""; width: 12px; height: 12px; border-radius: 50%; background: var(--gradient); }
.theme-menu { position: absolute; top: calc(100% + 6px); right: 0; min-width: 160px; background: var(--bg-card); border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); box-shadow: 0 16px 40px -12px rgba(55,1,128,.25); padding: 6px; display: none; z-index: 80; }
.theme-menu[open] { display: block; }
.theme-menu button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; background: transparent; border: 0; cursor: pointer; font-family: inherit; font-size: 13px; color: var(--text-primary); text-align: left; border-radius: 6px; }
.theme-menu button:hover { background: var(--bg-soft); }
.theme-menu button.active { background: var(--tint-li); color: var(--li-prime); font-weight: 600; }
.theme-menu .swatch { width: 14px; height: 14px; border-radius: 50%; border: 0.5px solid var(--border-soft); flex-shrink: 0; }
.theme-menu .swatch.light     { background: linear-gradient(135deg, #FBF7EE 50%, #EFE6FA 50%); }
.theme-menu .swatch.dark      { background: linear-gradient(135deg, #15082B 50%, #D90276 50%); }
.theme-menu .swatch.colourful { background: linear-gradient(135deg, #FC9628, #D90276 50%, #370180); }
.theme-menu .swatch.clean     { background: linear-gradient(135deg, #FFFFFF 50%, #15102A 50%); }

.tabs { position: sticky; top: 60px; z-index: 55; padding: 0 28px; background: var(--bg-page); border-bottom: 0.5px solid var(--border-soft); display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 13px 16px; font-size: 13.5px; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; user-select: none; background: transparent; border-left: 0; border-right: 0; border-top: 0; font-family: inherit; }
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--ar-light); font-weight: 600; }
.tab-ct { font-size: 10.5px; font-weight: 700; background: var(--bg-soft); color: var(--text-secondary); padding: 2px 8px; border-radius: var(--radius-full); letter-spacing: .3px; }
.tab.active .tab-ct { background: var(--tint-ar); color: var(--ar-prime); }

.summary-bar { padding: 14px 28px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; font-size: 13px; color: var(--text-secondary); background: var(--bg-card); border-bottom: 0.5px solid var(--border-soft); }
.summary-week { font-weight: 600; color: var(--text-primary); font-size: 14px; }
.summary-pulse { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; }
.summary-pulse b { color: var(--ch-dark); font-weight: 600; }
.chip { display: inline-flex; align-items: center; padding: 5px 12px; border-radius: var(--radius-full); background: var(--bg-soft); color: var(--text-secondary); border: 0.5px solid var(--border-soft); font-size: 12px; line-height: 1.4; }
.chip b { color: var(--text-primary); font-weight: 600; margin-right: 4px; }
.chip.notice { background: var(--tint-ox); color: var(--ox-prime); border-color: rgba(252,136,40,.20); }
.chip.notice b { color: var(--ox-prime); }

.main { padding: 24px 28px 96px; }
.grid { display: grid; grid-template-columns: 1fr; gap: 14px; max-width: 1100px; margin: 0 auto; }

.empty { padding: 56px 24px; text-align: center; color: var(--text-tertiary); background: var(--bg-card); border-radius: var(--radius-lg); border: 1px dashed var(--border-soft); }
.empty h3 { color: var(--text-primary); margin: 0 0 6px; font-weight: 600; }

.card { background: var(--bg-card); border: 0.5px solid var(--border-soft); border-radius: var(--radius-lg); padding: 18px 20px; transition: border-color .15s, transform .15s, box-shadow .15s; }
.card:hover { border-color: var(--border-strong); transform: translateY(-1px); box-shadow: 0 10px 30px -12px rgba(55,1,128,.15); }
.card-head { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; }
.ctag { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 6px; background: var(--bg-soft); color: var(--text-secondary); border: 0.5px solid var(--border-soft); letter-spacing: 0.2px; }
.ctag-domain { text-transform: uppercase; letter-spacing: 0.6px; font-size: 10px; font-weight: 700; padding: 4px 10px; }
.ctag-domain[data-topic-color] { background: var(--topic-tint, var(--bg-soft)); color: var(--topic-fg, var(--text-secondary)); border-color: var(--topic-border, var(--border-soft)); }
.ctag-loc { background: transparent; }
.ctag-date { color: var(--text-tertiary); border-color: transparent; }
.ctag-rule { background: var(--tint-li); color: var(--li-prime); border-color: rgba(87,21,128,.18); font-weight: 600; }
.ctag-source { background: transparent; color: var(--li-prime); border-color: rgba(87,21,128,.18); text-decoration: none; }
.ctag-source:hover { background: var(--tint-li); }

.risk-pill { margin-left: auto; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: var(--radius-full); letter-spacing: 0.6px; }
.r-high { background: var(--tint-ar); color: var(--r-high-fg); }
.r-med  { background: var(--tint-ox); color: var(--r-med-fg); }
.r-low  { background: var(--tint-ch); color: var(--r-low-fg); }

.card-title { font-size: 16.5px; font-weight: 600; line-height: 1.35; letter-spacing: -.3px; margin: 0 0 8px; color: var(--text-primary); }
.card-body { font-size: 13.5px; line-height: 1.55; color: var(--text-secondary); margin: 0 0 12px; }
.card-why { background: var(--tint-ar); border-left: 3px solid var(--ar-light); padding: 10px 14px; border-radius: 0 8px 8px 0; font-size: 12.5px; line-height: 1.55; color: var(--text-primary); margin-bottom: 12px; }
.card-why b { font-weight: 600; }
.card-foot { display: flex; flex-wrap: wrap; gap: 10px; font-size: 11.5px; color: var(--text-tertiary); border-top: 0.5px solid var(--border-soft); padding-top: 10px; }
.card-foot .opc { color: var(--text-secondary); }
.card-foot .opc b { color: var(--text-primary); font-weight: 500; }
.card-foot .owner { margin-left: auto; font-weight: 500; color: var(--text-secondary); }

.footer { margin: 48px auto 24px; max-width: 1100px; padding: 24px 0; border-top: 0.5px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; font-size: 11.5px; color: var(--text-tertiary); flex-wrap: wrap; gap: 12px; }
.footer a { color: var(--li-prime); }

html[data-theme="clean"] .card { box-shadow: none; }
html[data-theme="clean"] .card:hover { box-shadow: none; }
html[data-theme="clean"] .card-why { background: transparent; border-left-color: var(--text-tertiary); padding-left: 12px; }
html[data-theme="clean"] .topbar { background: transparent; backdrop-filter: none; }
html[data-theme="clean"] .summary-bar { background: transparent; }

@media (max-width: 860px) {
  .topbar { padding: 12px 16px; gap: 12px; flex-wrap: wrap; }
  .tabs { padding: 0 12px; top: 76px; }
  .summary-bar { padding: 12px 16px; gap: 8px; }
  .main { padding: 18px 14px 72px; }
  .search, .counters { display: none; }
  .brand-product { font-size: 12px; }
  .live-pill { font-size: 11px; padding: 5px 12px; }
}

  </style>

(function () {

    { id: "clean",     label: "Clean",     hint: "Minimal, lots of white"      }
  ];
  const STORAGE_KEY = "lib-theme";

  function applyTheme(id) {
    document.documentElement.setAttribute("data-theme", id);
    try { localStorage.setItem(STORAGE_KEY, id); } catch (e) {}
  }
  function initTheme() {
    let saved = null;
    try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) {}
    applyTheme(saved && THEMES.some(t => t.id === saved) ? saved : "light");
  }
  initTheme();

  const $  = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));
  const esc = (s) => String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");

  function hexToRgba(hex, a) {
    const h = hex.replace("#", "");
    const n = h.length === 3
      ? h.split("").map(c => parseInt(c + c, 16))
      : [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
    return "rgba(" + n[0] + "," + n[1] + "," + n[2] + "," + a + ")";
  }

  const state = { monitor: null, items: [], view: "all", q: "" };

  function renderChrome(m) {
    document.title = m.code + " · " + m.name + " · Legal Intelligence Briefing";
    $("#brand-product").innerHTML = "<b>" + esc(m.code) + "</b> — " + esc(m.name);

    const pill = $("#live-pill");
    pill.className = "live-pill " + (m.status || "live");
    $("#live-pill-label").textContent = m.status_label || (m.week_iso || "Live");

    const tabs = $("#tabs");
    tabs.innerHTML = "";
    tabs.appendChild(makeTab("all", "All items", state.items.length));
    (m.topics || []).forEach(t => {
      tabs.appendChild(makeTab(t.id, t.label, countByTopic(t.id), t.color));
    });

    $("#summary-week").textContent = m.week_label || "";
    const pulseStatus = (m.status === "calibrating") ? "calibrating"
                     : (m.status === "pending")     ? "awaiting sign-off"
                     : (m.status === "dormant")     ? "dormant"
                     : "live";
    $("#summary-pulse").innerHTML = "Pulse: <b>" + esc(pulseStatus) + "</b>";

    const chipsRow = $("#summary-chips");
    chipsRow.innerHTML = "";
    (m.chips || []).forEach(c => {
      const el = document.createElement("span");
      el.className = "chip";
      el.innerHTML = c.replace(/<\/?b>/g, (t) => t);
      chipsRow.appendChild(el);
    });
    if (m.footer_note) {
      const note = document.createElement("span");
      note.className = "chip notice";
      note.textContent = m.footer_note;
      chipsRow.appendChild(note);
    }

    const high = state.items.filter(i => i.risk === "high").length;
    const med  = state.items.filter(i => i.risk === "med").length;
    $("#ct-total").textContent = state.items.length;
    $("#ct-high").textContent  = high;
    $("#ct-med").textContent   = med;
    $("#search-input").placeholder = "Search across " + state.items.length + " items…";

    $("#footer-meta").textContent =
      (m.privilege_note || "Privileged · Prosus internal + named external counsel") +
      " · " + (m.week_label || "");
    $("#footer-gen").textContent =
      "Generated " + (m.generated_at || "—") + " · v" + (m.version || "0.1");
  }

  function makeTab(id, label, count, color) {
    const btn = document.createElement("button");
    btn.className = "tab" + (state.view === id ? " active" : "");
    btn.dataset.view = id;
    if (color) btn.style.setProperty("--topic-color", color);
    btn.innerHTML = esc(label) + ' <span class="tab-ct">' + count + "</span>";
    btn.addEventListener("click", () => {
      state.view = id;
      $$(".tab").forEach(t => t.classList.toggle("active", t === btn));
      renderItems();
    });
    return btn;
  }

  function countByTopic(topicId) {
    return state.items.filter(i => i.theme === topicId).length;
  }

  function topicLookup() {
    const map = {};
    (state.monitor.topics || []).forEach(t => { map[t.id] = t; });
    return map;
  }

  function matches(it) {
    if (state.view !== "all" && it.theme !== state.view) return false;
    if (state.q) {
      const hay = [it.title, it.body, it.why, it.co, it.countryLabel, it.catLabel]
        .filter(Boolean).join(" ").toLowerCase();
      if (hay.indexOf(state.q.toLowerCase()) === -1) return false;
    }
    return true;
  }

  function renderItems() {
    const topics = topicLookup();
    const grid = $("#item-grid");
    const list = state.items.filter(matches);

    if (!list.length) {
      grid.innerHTML =
        '<div class="empty"><h3>No items match these filters</h3>' +
        "<p>Clear the search or pick another tab.</p></div>";
      return;
    }

    grid.innerHTML = list.map(it => {
      const topic = topics[it.theme] || {};
      const color = topic.color || "#571580";
      const domain = topic.label || it.theme;
      const r = it.risk === "high" ? "r-high" : it.risk === "med" ? "r-med" : "r-low";
      const rl = it.risk === "high" ? "HIGH" : it.risk === "med" ? "MED" : "LOW";
      const ruleChip = it.rule ? '<span class="ctag ctag-rule">' + esc(it.rule) + "</span>" : "";
      const styleVars =
        "--topic-fg:" + color + ";" +
        "--topic-tint:" + hexToRgba(color, 0.10) + ";" +
        "--topic-border:" + hexToRgba(color, 0.28);
      return '<article class="card">' +
        '<header class="card-head">' +
          '<span class="ctag ctag-domain" data-topic-color style="' + styleVars + '">' + esc(domain) + "</span>" +
          (it.catLabel ? '<span class="ctag">' + esc(it.catLabel) + "</span>" : "") +
          (it.countryLabel ? '<span class="ctag ctag-loc">' + esc(it.countryLabel) + "</span>" : "") +
          (it.dateLabel ? '<span class="ctag ctag-date">' + esc(it.dateLabel) + "</span>" : "") +
          ruleChip +
          (it.source ? '<a class="ctag ctag-source" href="' + esc(it.url || "#") +
            '" target="_blank" rel="noopener">' + esc(it.source) + " ↗</a>" : "") +
          '<span class="risk-pill ' + r + '">' + rl + "</span>" +
        "</header>" +
        '<h3 class="card-title">' + esc(it.title) + "</h3>" +
        (it.body ? '<p class="card-body">' + esc(it.body) + "</p>" : "") +
        (it.why ? '<div class="card-why"><b>Why it matters →</b> ' + esc(it.why) + "</div>" : "") +
        '<footer class="card-foot">' +
          (it.co ? '<span class="opc">OpCos: <b>' + esc(it.co) + "</b></span>" : "") +
          (it.owner ? '<span class="owner">' + esc(it.owner) +
            (it.ownerTeam ? " · " + esc(it.ownerTeam) : "") + "</span>" : "") +
        "</footer>" +
      "</article>";
    }).join("");

    $$(".tab").forEach(t => {
      const v = t.dataset.view;
      const ct = v === "all" ? state.items.length : countByTopic(v);
      const span = t.querySelector(".tab-ct");
      if (span) span.textContent = ct;
    });
  }

  function mountThemePicker() {
    const btn = $("#theme-toggle");
    const menu = $("#theme-menu");
    menu.innerHTML = THEMES.map(t => {
      const active = document.documentElement.getAttribute("data-theme") === t.id;
      return '<button data-theme="' + t.id + '" class="' + (active ? "active" : "") + '" title="' + esc(t.hint) + '">' +
        '<span class="swatch ' + t.id + '" aria-hidden="true"></span>' +
        '<span>' + esc(t.label) + "</span>" +
      "</button>";
    }).join("");
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const open = menu.hasAttribute("open");
      if (open) menu.removeAttribute("open"); else menu.setAttribute("open", "");
    });
    menu.addEventListener("click", (e) => {
      const target = e.target.closest("button[data-theme]");
      if (!target) return;
      applyTheme(target.dataset.theme);
      $$("#theme-menu button").forEach(b => b.classList.toggle("active", b === target));
      menu.removeAttribute("open");
    });
    document.addEventListener("click", (e) => {
      if (!menu.contains(e.target) && e.target !== btn) menu.removeAttribute("open");
    });
  }

  function mountSearch() {
    $("#search-input").addEventListener("input", (e) => {
      state.q = e.target.value.trim();
      renderItems();
    });
  }

  async function boot() {
    mountThemePicker();
    mountSearch();
    // Prefer inline data (works over file:// and CDN both); fall back to fetch
    let m = null, items = null;
    try {
      if (window.MONITOR_DATA && window.ITEMS_DATA) {
        m = window.MONITOR_DATA;
        items = window.ITEMS_DATA;
      } else {

          fetch("./monitor.json", { cache: "no-store" }).then(r => r.json()),
          fetch("./items.json",   { cache: "no-store" }).then(r => r.json())
        ]);
        m = r[0]; items = r[1];
      }
      state.monitor = m;
      state.items = Array.isArray(items) ? items : (items.items || []);
      render
