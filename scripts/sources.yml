# RSS feed configuration per domain
#
# Format:
#   monitor-NN/domain-name:
#     - name: human-readable label
#       url: RSS feed URL
#
# Only free, publicly accessible feeds are listed here. Paid sources (MLex,
# GCR, PaRR) require API access and go in a separate sources-paid.yml once
# Prosus subscriptions are confirmed.
#
# Feeds verified or commonly available as of 2026-05-13. Some agencies don't
# publish RSS — for those, HTML scraping or a paid-source aggregator is needed.
# v0.1 only covers the RSS-available subset; gaps are flagged inline.
#
# HTML-only sources are configured in scrape_sources.yml (sibling file),
# consumed by scrape_articles.py. Both fetchers write to findings/candidates/
# with the same schema, distinguished by `source_method: rss|scrape`.
#
# 2026-05-14 audit:
#  - URL changes for 6 publishers whose feed paths moved (USPTO, CNIL, Garante,
#    EDPB, Kluwer Competition, Import AI -> Jack Clark mirror).
#  - 7 publishers have killed RSS entirely and need HTML scraping (Anthropic,
#    ICO, AEPD, Bruegel, Reuters Legal, e-Competitions/Concurrences, CEPS).
#    Their URLs are left in place for now -- the fetcher logs the 404/403
#    once per run, which is non-fatal. Move to scrape_sources.yml when ready.
#  - 2 publishers appear to IP-block GitHub Actions egress (Law.com, ABA).
#    Leaving URLs in place -- they may work later from a different runner
#    or via a residential proxy.

# =========================================================
# Monitor 01 — Regulatory Intelligence
# =========================================================

monitor-01/ai-news:
  - name: Anthropic news
    url: https://www.anthropic.com/news/rss.xml
  - name: OpenAI blog
    url: https://openai.com/blog/rss.xml
  - name: Hugging Face blog
    url: https://huggingface.co/blog/feed.xml
  - name: NIST news (filtered for AI in script)
    url: https://www.nist.gov/news-events/news/rss.xml
  - name: ICO news
    url: https://ico.org.uk/about-the-ico/media-centre/news-and-blogs/rss/
  - name: European Commission press
    url: https://ec.europa.eu/commission/presscorner/api/rss?language=en
  - name: AI Snake Oil
    url: https://www.aisnakeoil.com/feed
  - name: Import AI (Jack Clark)
    # Substack URL importai.substack.com/feed returned 403 from GH Actions
    # (Substack blocks runner IP ranges). Jack Clark's personal blog at
    # jack-clark.net mirrors Import AI posts and is a plain WordPress feed.
    url: https://jack-clark.net/feed/

monitor-01/privacy-data-protection:
