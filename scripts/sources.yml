# RSS feed configuration per domain
#
# Format:
#   monitor-NN/domain-name:
#     - name: human-readable label
#       url: RSS feed URL
#
# Only free, publicly accessible feeds are listed here. Paid sources (MLex,
# GCR, PaRR) require API access and go in a separate sources-paid.yml once
# Prosus subscriptions are confirmed.
#
# Feeds verified or commonly available as of 2026-05-13. Some agencies don't
# publish RSS — for those, HTML scraping or a paid-source aggregator is needed.
# v0.1 only covers the RSS-available subset; gaps are flagged inline.
#
# HTML-only sources are configured in scrape_sources.yml (sibling file),
# consumed by scrape_articles.py. Both fetchers write to findings/candidates/
# with the same schema, distinguished by `source_method: rss|scrape`.

